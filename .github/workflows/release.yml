name: Build Token Orb

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build EXE, MSI, and release archives
        shell: powershell
        run: .\build.ps1 -OutputDirectory .\dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TokenOrb
          path: dist/TokenOrb.*
          if-no-files-found: error

      - name: Remove existing GitHub Release for this tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view $env:GITHUB_REF_NAME *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $env:GITHUB_REF_NAME --yes
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
          exit 0

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            "dist/TokenOrb.exe" `
            "dist/TokenOrb.msi" `
            "dist/TokenOrb.zip" `
            "dist/TokenOrb.source.zip" `
            "dist/TokenOrb.md" `
            "dist/TokenOrb.sha256" `
            --verify-tag `
            --generate-notes `
            --title "TokenOrb $env:GITHUB_REF_NAME"
